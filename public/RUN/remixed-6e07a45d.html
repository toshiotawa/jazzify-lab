<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>リーフのだいぼうけん</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root{
    --sky-1:#3aa0e8; --sky-2:#9fdcff; --sky-3:#d8f3ff;
    --ink:#2a2140; --cream:#fff4d6; --gold:#ffd23f; --rose:#ff5b78;
    --panel:#241a3a; --panel-2:#2f234d; --line:#4a3a78;
    --accent:#ffb43d; --good:#67d96b;
  }
  *{ box-sizing:border-box; }
  html,body{ height:100%; margin:0; }
  body{
    background:
      radial-gradient(1200px 600px at 50% -10%, #2a2150 0%, #160f2c 55%, #0e0a1f 100%);
    font-family:"Baloo 2", system-ui, sans-serif;
    color:var(--cream);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100vh; padding:18px 12px; gap:14px;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  body::before{
    content:""; position:fixed; inset:0; pointer-events:none; opacity:.06; z-index:0;
    background-image:radial-gradient(circle, #fff 1px, transparent 1.4px);
    background-size:26px 26px;
  }
  .wrap{ position:relative; z-index:1; width:100%; max-width:960px; }
  .titlebar{ display:flex; align-items:baseline; gap:14px; justify-content:center; margin-bottom:10px; flex-wrap:wrap; }
  .titlebar h1{
    font-family:"Press Start 2P"; font-size:18px; margin:0; letter-spacing:1px;
    color:var(--gold); text-shadow:0 3px 0 #b97600, 0 4px 0 rgba(0,0,0,.4);
  }
  .titlebar span{ font-weight:700; color:#b9aee0; font-size:14px; }

  #frame{
    position:relative; width:100%; border-radius:18px; overflow:hidden;
    background:#0b0a18;
    border:4px solid #120e26;
    box-shadow:
      0 0 0 4px #2c2350,
      0 18px 40px rgba(0,0,0,.55),
      inset 0 0 0 2px rgba(255,255,255,.04);
    aspect-ratio:960 / 528;
  }
  canvas#game{ display:block; width:100%; height:100%; image-rendering:auto; }

  /* subtle CRT scanlines + vignette */
  #scanlines{
    position:absolute; inset:0; pointer-events:none; z-index:5; border-radius:14px;
    background:
      repeating-linear-gradient(to bottom, rgba(0,0,0,.10) 0 2px, rgba(0,0,0,0) 2px 4px);
    mix-blend-mode:multiply; opacity:.5;
  }
  #vignette{
    position:absolute; inset:0; pointer-events:none; z-index:5; border-radius:14px;
    box-shadow: inset 0 0 120px rgba(0,0,0,.45);
  }

  #top-buttons{ position:absolute; top:10px; right:12px; z-index:7; display:flex; gap:8px; }
  .iconbtn{
    font-family:"Press Start 2P"; font-size:12px; color:var(--cream);
    width:38px; height:38px; border-radius:10px; cursor:pointer;
    background:linear-gradient(#3a2c63,#271c45); border:2px solid #51407f;
    box-shadow:0 3px 0 #181030; display:grid; place-items:center; user-select:none;
    transition:transform .06s, box-shadow .06s;
  }
  .iconbtn:active{ transform:translateY(3px); box-shadow:0 0 0 #181030; }

  /* overlays */
  .overlay{
    position:absolute; inset:0; z-index:8; display:flex; flex-direction:column;
    align-items:center; gap:12px; text-align:center; overflow-y:auto;
    background:radial-gradient(900px 500px at 50% 40%, rgba(20,14,40,.72), rgba(10,7,22,.92));
    backdrop-filter:blur(3px); padding:18px 16px;
    animation:fade .25s ease;
  }
  .overlay.hidden{ display:none; }
  .overlay > :first-child{ margin-top:auto; }
  .overlay > :last-child{ margin-bottom:auto; }
  @keyframes fade{ from{opacity:0} to{opacity:1} }
  .overlay h2{
    font-family:"Press Start 2P"; margin:0; line-height:1.5;
    text-shadow:0 4px 0 rgba(0,0,0,.5);
  }
  .title-logo{ font-size:30px; color:var(--gold); text-shadow:0 4px 0 #b97600, 0 6px 0 rgba(0,0,0,.45); }
  .title-sub{ font-family:"Press Start 2P"; font-size:11px; color:#c9bff0; letter-spacing:1px; }
  .kicker{ font-weight:700; color:#cdb9ff; font-size:14px; max-width:540px; line-height:1.45; }
  .ctrls{
    display:flex; flex-direction:column; align-items:center; gap:6px;
    font-weight:700; color:#e7ddff; font-size:13px; max-width:620px;
  }
  .ctrls b{ color:var(--gold); font-family:"Press Start 2P"; font-size:10px; }
  .btn{
    font-family:"Press Start 2P"; font-size:14px; color:#3a2300; cursor:pointer;
    padding:13px 24px; border-radius:14px; user-select:none; flex:0 0 auto;
    background:linear-gradient(#ffd54a,#ffb028); border:none;
    box-shadow:0 6px 0 #b56b00, 0 10px 18px rgba(0,0,0,.4);
    transition:transform .07s, box-shadow .07s; letter-spacing:1px;
  }
  .btn:active{ transform:translateY(6px); box-shadow:0 0 0 #b56b00, 0 4px 10px rgba(0,0,0,.4); }
  .btn.ghost{ background:linear-gradient(#4a3a78,#352a5c); color:#fff4d6; box-shadow:0 6px 0 #20183c; }
  .btn.ghost:active{ box-shadow:0 0 0 #20183c; }
  .row{ display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }
  .scorecard{
    font-family:"Press Start 2P"; font-size:12px; color:var(--cream); line-height:2;
    background:rgba(0,0,0,.28); border:2px solid var(--line); border-radius:12px; padding:14px 22px;
  }
  .scorecard .v{ color:var(--gold); }
  .win h2{ color:var(--good); }
  .over h2{ color:var(--rose); }
  .blink{ animation:blink 1s steps(2,end) infinite; }
  @keyframes blink{ 50%{opacity:.25} }

  /* touch controls */
  #touch{ display:none; width:100%; max-width:960px; gap:12px; user-select:none; }
  #touch.show{ display:flex; }
  #touch .pad{ display:flex; gap:12px; }
  .tbtn{
    flex:1; min-width:84px; height:74px; border-radius:16px; cursor:pointer;
    font-family:"Press Start 2P"; font-size:16px; color:var(--cream);
    background:linear-gradient(#3a2c63,#271c45); border:2px solid #51407f;
    box-shadow:0 5px 0 #181030; display:grid; place-items:center; touch-action:none;
  }
  #t-jump{ flex:1.4; background:linear-gradient(#ffd54a,#ffb028); color:#3a2300; box-shadow:0 5px 0 #b56b00; font-size:13px; }
  #t-shoot{ flex:.9; background:linear-gradient(#8fd0ff,#4aa3e8); color:#08263f; box-shadow:0 5px 0 #2f6ea8; font-size:22px; }
  .tbtn:active{ transform:translateY(4px); }
  .hint{ color:#8e83b6; font-weight:600; font-size:13px; text-align:center; margin:0; }
  @media (max-width:560px){
    .titlebar h1{ font-size:14px; } .title-logo{ font-size:22px; }
    .overlay{ gap:8px; padding:12px; }
    .kicker{ font-size:12px; line-height:1.35; max-width:300px; }
    #ov-title .ctrls{ display:none; }
    .btn{ padding:11px 20px; font-size:13px; }
    .title-sub{ font-size:10px; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="titlebar">
      <h1>リーフのだいぼうけん</h1>
      <span>— a tiny platform adventure</span>
    </div>

    <div id="frame">
      <canvas id="game" width="960" height="528"></canvas>
      <div id="scanlines"></div>
      <div id="vignette"></div>

      <div id="top-buttons">
        <button class="iconbtn" id="btn-mute" title="サウンド">♪</button>
        <button class="iconbtn" id="btn-pause" title="ポーズ">II</button>
      </div>

      <!-- TITLE -->
      <div class="overlay" id="ov-title">
        <div class="title-logo">リーフのだいぼうけん</div>
        <div class="title-sub">LEAF'S BIG ADVENTURE</div>
        <div class="kicker">踏む・スパークで敵を倒し、コインを集めて旗のゴールを目指す横スクロールアクション！</div>
        <div class="ctrls">
          <div><b>← →</b> / A D いどう　<b>SPACE</b> / ↑ ジャンプ　<b>SHIFT</b> ダッシュ</div>
          <div><b>J / X</b> こうげき（スパーク）　<b>P</b> ポーズ　<b>M</b> サウンド</div>
        </div>
        <button class="btn" id="btn-start">スタート ▶</button>
      </div>

      <!-- PAUSE -->
      <div class="overlay hidden" id="ov-pause">
        <h2 style="font-size:22px;color:var(--gold)">ポーズ中</h2>
        <div class="row">
          <button class="btn" id="btn-resume">つづける ▶</button>
          <button class="btn ghost" id="btn-restart-p">さいしょから</button>
        </div>
      </div>

      <!-- WIN -->
      <div class="overlay hidden win" id="ov-win">
        <h2 style="font-size:30px">クリア！</h2>
        <div class="scorecard" id="win-card"></div>
        <button class="btn" id="btn-again">もう一度 ▶</button>
      </div>

      <!-- GAME OVER -->
      <div class="overlay hidden over" id="ov-over">
        <h2 style="font-size:30px">ゲームオーバー</h2>
        <div class="scorecard" id="over-card"></div>
        <button class="btn" id="btn-retry">リトライ ▶</button>
      </div>
    </div>

    <div id="touch">
      <div class="pad">
        <button class="tbtn" id="t-left">◀</button>
        <button class="tbtn" id="t-right">▶</button>
      </div>
      <button class="tbtn" id="t-shoot">★</button>
      <button class="tbtn" id="t-jump">JUMP</button>
    </div>

    <p class="hint">クリックで操作開始 ・ スマホはタッチボタンが出ます</p>
  </div>

  const atlasImg=new Image(); const bgImg=new Image();
  let _assetN=0; let assetsReady=false;

  function blit(name,dx,dy,dw,dh,flip){
    const f=FRAMES[name]; if(!f) return;
    const sx=f[0],sy=f[1],sw=f[2],sh=f[3];
    if(flip){ ctx.save(); ctx.translate(Math.round(dx)+dw,Math.round(dy)); ctx.scale(-1,1);

  const TILE = 48;

  const WALK_MAX = 4.6, RUN_MAX = 7.3;

  const JUMP_VEL = -15.4, COYOTE = 7, JUMP_BUFFER = 8;
  const STOMP_BOUNCE = -11.5;
  const ENEMY_SPEED = 1.25;
  const PW = 34, PH = 42, EW = 38, EH = 34, COIN = 26;
  const ITEM = 30, STAR_TIME = 480;
  const PROJ = 18, PROJ_SPEED = 8.5, PROJ_LIFE = 70, PROJ_COOLDOWN = 16, PROJ_MAX = 3;
  const TIME_START = 250;

  const tiles = new Map();           // "c,r" -> {type:'ground'|'brick'|'platform'|'block'}
  const blockState = new Map();      // "c,r" -> {coins, used, bump}

  const PITS = [[26,28],[60,63],[96,98],[128,129]];

  function buildLevel(){

  // ---------- entity setup ----------
  function makeEnemy(s){
    return { x:s.c*TILE+(TILE-EW)/2, y:s.r*TILE-EH, w:EW, h:EH,
             vx:-ENEMY_SPEED, vy:0, dir:-1, onGround:false, dead:false,
             deadT:0, anim:Math.random()*6 };
  }
  function resetEnemies(){ enemies = enemySpawns.map(makeEnemy); }
  function resetCoins(full){
    coins = coinInit.map((c,i)=>({ x:c.x, y:c.y, collected: full? false : (coins[i]?coins[i].collected:false), phase:i*0.7 }));
  }
  function resetItems(full){
    items = itemInit.map((it,i)=>({ x:it.x, y:it.y, type:it.type, collected: full? false : (items[i]?items[i].collected:false), phase:i*0.8 }));
  }
  function resetBlocks(){
    for(const [,bs] of blockState){ bs.coins=bs.init; bs.used=false; bs.bump=0; }
  }

  // ---------- player ----------
  const player = {
    x:SPAWN.x, y:SPAWN.y, w:PW, h:PH, vx:0, vy:0,
    onGround:false, facing:1, coyote:0, runPhase:0,
    sx:1, sy:1, landSquash:0, invul:0, star:0, maxHp:3, hp:3, hurtT:0, shootCD:0
  };
  function placePlayer(){
    player.x=SPAWN.x; player.y=SPAWN.y; player.vx=0; player.vy=0;
    player.onGround=false; player.facing=1; player.coyote=0;
    player.runPhase=0; player.sx=1; player.sy=1; player.landSquash=0; player.star=0;
    player.hp=player.maxHp; player.hurtT=0; player.shootCD=0;
  }

  // ---------- game state ----------
  let state = 'title';     // title|playing|paused|clearing|win|over
  let score = 0, coinCount = 0, lives = 3, timer = TIME_START, best = 0;
  let particles = [], floats = [];
  let cameraX = 0, tick = 0, clearT = 0, jumpBuf = 0;

  function clampCam(){
    cameraX = Math.max(0, Math.min(player.x + PW/2 - VIEW_W/2, LEVEL_PX - VIEW_W));
  }

  function newGame(){
    buildLevel(); resetEnemies(); resetCoins(true); resetItems(true); resetBlocks();
    placePlayer(); particles=[]; floats=[]; projs=[];
    score=0; coinCount=0; lives=3; timer=TIME_START; player.invul=40;
    clampCam(); state='playing'; hideOverlays(); ensureAudio(); sfx('start');
  }
  function respawn(){
    resetEnemies(); placePlayer(); particles=[]; floats=[]; projs=[];
    timer=TIME_START; player.invul=120; clampCam(); state='playing';
  }
  function damage(srcX){
    if(player.invul>0 || player.star>0 || state!=='playing') return;
    player.hp--; player.hurtT=26; player.invul=90; sfx('hurt');
    const dir=(player.x+PW/2)<srcX ? -1 : 1;
    player.vx=dir*5.5; player.vy=-7; player.onGround=false;
    for(let i=0;i<8;i++) particles.push(burst(player.x+PW/2, player.y+PH/2, '#ff7a8a'));
    addFloat(player.x, player.y-10,'-1','#ff8aa0');
    if(player.hp<=0) loseLife();
  }
  function loseLife(){
    if(state!=='playing') return;
    lives--; sfx('hurt');
    for(let i=0;i<14;i++) particles.push(burst(player.x+PW/2, player.y+PH/2, '#fff4d6'));
    if(lives<=0){ best=Math.max(best,score); showOverlay('ov-over'); state='over'; renderOverCard(); }
    else respawn();
  }

  // ---------- particles / floats ----------
  function burst(x,y,color){
    const a=Math.random()*Math.PI*2, s=2+Math.random()*4;
    return {x,y,vx:Math.cos(a)*s, vy:Math.sin(a)*s-2, life:1, color, g:0.25, size:3+Math.random()*3};
  }
  function dust(x,y){
    return {x,y,vx:(Math.random()-0.5)*2, vy:-Math.random()*1.5, life:0.6, color:'#ffffff', g:0.06, size:3+Math.random()*2};
  }
  function coinPop(x,y){
    return {x,y,vx:0,vy:-5,life:0.8,color:'#ffd23f',g:0.32,size:8,coin:true};
  }
  function addFloat(x,y,text,color){ floats.push({x,y,text,color:color||'#fff4d6',life:1}); }

  // ---------- audio ----------
  let actx=null, muted=false;
  function ensureAudio(){
    if(!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
    if(actx && actx.state==='suspended') actx.resume();
  }
  function tone(freq,dur,type,vol,slideTo,delay){
    if(!actx||muted) return;
    const t0=actx.currentTime+(delay||0);
    const o=actx.createOscillator(), g=actx.createGain();
    o.type=type||'square'; o.frequency.setValueAtTime(freq,t0);
    if(slideTo) o.frequency.exponentialRampToValueAtTime(slideTo,t0+dur);
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.exponentialRampToValueAtTime(vol||0.14,t0+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
    o.connect(g).connect(actx.destination); o.start(t0); o.stop(t0+dur+0.03);
  }
  function sfx(n){
    if(muted) return; ensureAudio(); if(!actx) return;
    if(n==='jump') tone(420,0.16,'square',0.15,840);
    else if(n==='coin'){ tone(988,0.07,'square',0.13); tone(1319,0.12,'square',0.13,null,0.06); }
    else if(n==='stomp') tone(300,0.12,'square',0.16,120);
    else if(n==='bump') tone(170,0.09,'square',0.11,110);
    else if(n==='hurt') tone(380,0.32,'sawtooth',0.18,90);
    else if(n==='1up'){ [659,784,988,1319].forEach((f,i)=>tone(f,0.12,'square',0.13,null,i*0.09)); }
    else if(n==='clear'){ [523,659,784,1047,1319,1047,1319].forEach((f,i)=>tone(f,0.2,'square',0.14,null,i*0.14)); }
    else if(n==='start') tone(523,0.1,'square',0.13,784);
    else if(n==='gem'){ tone(1175,0.08,'triangle',0.13); tone(1568,0.14,'triangle',0.13,null,0.06); }
    else if(n==='power'){ [523,659,784,1047,1319].forEach((f,i)=>tone(f,0.10,'square',0.14,null,i*0.06)); }
    else if(n==='shoot'){ tone(740,0.08,'square',0.12,1180); }
  }

  // ---------- input ----------
  const keys = { left:false, right:false, jump:false, run:false };
  function onJumpRelease(){ if(player.vy<0) player.vy*=0.42; }
  window.addEventListener('keydown', e=>{
    const k=e.code;
    if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space'].includes(k)) e.preventDefault();
    if(k==='ArrowLeft'||k==='KeyA') keys.left=true;
    else if(k==='ArrowRight'||k==='KeyD') keys.right=true;
    else if(k==='ArrowUp'||k==='KeyW'||k==='Space'){ if(!keys.jump) jumpBuf=JUMP_BUFFER; keys.jump=true; }
    else if(k==='ShiftLeft'||k==='ShiftRight') keys.run=true;
    else if(k==='KeyP'||k==='Escape'){ togglePause(); }
    else if(k==='KeyM'){ toggleMute(); }
    else if(k==='KeyJ'||k==='KeyX'||k==='KeyF'){ shoot(); }
    // menu confirm
    if(k==='Space'||k==='Enter'){
      if(state==='title') newGame();
      else if(state==='win') newGame();
      else if(state==='over') newGame();
    }
  });
  window.addEventListener('keyup', e=>{
    const k=e.code;
    if(k==='ArrowLeft'||k==='KeyA') keys.left=false;
    else if(k==='ArrowRight'||k==='KeyD') keys.right=false;
    else if(k==='ArrowUp'||k==='KeyW'||k==='Space'){ keys.jump=false; onJumpRelease(); }
    else if(k==='ShiftLeft'||k==='ShiftRight') keys.run=false;
  });

  // touch
  function bindTouch(el, on, off){
    const start=e=>{ e.preventDefault(); ensureAudio(); on(); };
    const end=e=>{ e.preventDefault(); off&&off(); };
    el.addEventListener('touchstart',start,{passive:false});
    el.addEventListener('touchend',end,{passive:false});
    el.addEventListener('touchcancel',end,{passive:false});
    el.addEventListener('mousedown',start);
    el.addEventListener('mouseup',end);
    el.addEventListener('mouseleave',end);
  }
  bindTouch(document.getElementById('t-left'), ()=>keys.left=true, ()=>keys.left=false);
  bindTouch(document.getElementById('t-right'),()=>keys.right=true,()=>keys.right=false);
  bindTouch(document.getElementById('t-shoot'), ()=>shoot(), null);
  bindTouch(document.getElementById('t-jump'), ()=>{ if(!keys.jump) jumpBuf=JUMP_BUFFER; keys.jump=true; }, ()=>{ keys.jump=false; onJumpRelease(); });
  if('ontouchstart' in window || navigator.maxTouchPoints>0){
    document.getElementById('touch').classList.add('show');
  }

  // ---------- overlays / buttons ----------
  const overlays = ['ov-title','ov-pause','ov-win','ov-over'];
  function hideOverlays(){ overlays.forEach(id=>document.getElementById(id).classList.add('hidden')); }
  function showOverlay(id){ hideOverlays(); document.getElementById(id).classList.remove('hidden'); }
  function togglePause(){
    if(state==='playing'){ state='paused'; showOverlay('ov-pause'); }
    else if(state==='paused'){ state='playing'; hideOverlays(); }
  }
  function toggleMute(){
    muted=!muted; document.getElementById('btn-mute').textContent = muted?'×':'♪';
  }
  document.getElementById('btn-start').onclick   = ()=>{ ensureAudio(); newGame(); };
  document.getElementById('btn-resume').onclick  = ()=> togglePause();
  document.getElementById('btn-restart-p').onclick = ()=> newGame();
  document.getElementById('btn-again').onclick   = ()=> newGame();
  document.getElementById('btn-retry').onclick   = ()=> newGame();
  document.getElementById('btn-pause').onclick   = ()=> togglePause();
  document.getElementById('btn-mute').onclick    = ()=> toggleMute();

  function renderWinCard(bonus){
    document.getElementById('win-card').innerHTML =
      'スコア&nbsp;&nbsp;<span class="v">'+pad(score)+'</span><br>'+
      'コイン&nbsp;&nbsp;<span class="v">'+coinCount+'</span><br>'+
      'タイムボーナス&nbsp;&nbsp;<span class="v">+'+bonus+'</span><br>'+
      'ベスト&nbsp;&nbsp;<span class="v">'+pad(best)+'</span>';
  }
  function renderOverCard(){
    document.getElementById('over-card').innerHTML =
      'スコア&nbsp;&nbsp;<span class="v">'+pad(score)+'</span><br>'+
      'コイン&nbsp;&nbsp;<span class="v">'+coinCount+'</span><br>'+
      'ベスト&nbsp;&nbsp;<span class="v">'+pad(best)+'</span>';
  }
  const pad = n => ('000000'+Math.floor(n)).slice(-6);

  // ---------- collision helpers ----------
  function solidsInRect(x,y,w,h){
    const c0=Math.floor(x/TILE), c1=Math.floor((x+w-1e-4)/TILE);
    const r0=Math.floor(y/TILE), r1=Math.floor((y+h-1e-4)/TILE);
    const out=[];
    for(let r=r0;r<=r1;r++) for(let c=c0;c<=c1;c++){
      if(isSolid(c,r)) out.push({c,r,left:c*TILE,top:r*TILE});
    }
    return out;
  }
  function overlap(a,b){ return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y; }

  function bumpBlock(c,r){
    const bs = blockState.get(key(c,r)); if(!bs) return;
    bs.bump = 9;
    if(!bs.used && bs.coins>0){
      bs.coins--; coinCount++; score+=100;
      particles.push(coinPop(c*TILE+TILE/2, r*TILE-6));
      sfx('coin');
      if(bs.coins<=0) bs.used=true;
      if(coinCount>=100){ coinCount-=100; lives++; sfx('1up'); addFloat(player.x, player.y-10,'1UP','#67d96b'); }
    } else {
      sfx('bump');
    }
  }

  // ---------- update ----------
  function updatePlayer(){
    // horizontal input
    const maxS = keys.run ? RUN_MAX : WALK_MAX;
    const acc  = keys.run ? RUN_ACCEL : WALK_ACCEL;
    let dir = (keys.right?1:0) - (keys.left?1:0);
    if(dir!==0){
      player.vx += dir*acc;
      if(player.vx> maxS) player.vx=maxS;
      if(player.vx<-maxS) player.vx=-maxS;
      player.facing = dir;
    } else {
      const d = player.onGround?GROUND_DECEL:AIR_DECEL;
      if(player.vx>d) player.vx-=d; else if(player.vx<-d) player.vx+=d; else player.vx=0;
    }

    // gravity
    player.vy += GRAVITY; if(player.vy>MAX_FALL) player.vy=MAX_FALL;

    // jump (coyote + buffer)
    if(player.onGround) player.coyote=COYOTE; else if(player.coyote>0) player.coyote--;
    if(jumpBuf>0 && (player.onGround||player.coyote>0)){
      player.vy=JUMP_VEL; player.onGround=false; player.coyote=0; jumpBuf=0;
      sfx('jump');
      for(let i=0;i<5;i++) particles.push(dust(player.x+PW/2, player.y+PH));
    }
    if(jumpBuf>0) jumpBuf--;

    // --- move X ---
    player.x += player.vx;
    let hit = solidsInRect(player.x,player.y,player.w,player.h);
    if(hit.length){
      if(player.vx>0) player.x = Math.min.apply(null,hit.map(o=>o.left)) - player.w;
      else if(player.vx<0) player.x = Math.max.apply(null,hit.map(o=>o.left+TILE));
      player.vx=0;
    }
    if(player.x<0) player.x=0;
    if(player.x>LEVEL_PX-player.w) player.x=LEVEL_PX-player.w;

    // --- move Y ---
    const wasAir = !player.onGround;
    player.y += player.vy;
    let v = solidsInRect(player.x,player.y,player.w,player.h);
    player.onGround=false;
    if(v.length){
      if(player.vy>0){
        player.y = Math.min.apply(null,v.map(o=>o.top)) - player.h;
        player.onGround=true;
        if(wasAir && player.vy>6){ player.landSquash=1; for(let i=0;i<4;i++) particles.push(dust(player.x+PW/2, player.y+PH)); }
      } else if(player.vy<0){
        player.y = Math.max.apply(null,v.map(o=>o.top+TILE));
        for(const o of v){ if(getType(o.c,o.r)==='block') bumpBlock(o.c,o.r); }
      }
      player.vy=0;
    }

    // run animation + squash
    if(player.onGround && Math.abs(player.vx)>0.4) player.runPhase += Math.abs(player.vx)*0.16;
    else player.runPhase += 0.05;
    if(player.landSquash>0) player.landSquash-=0.12;
    let tsx=1, tsy=1;
    if(!player.onGround){ if(player.vy<0){ tsx=0.86; tsy=1.18; } else { tsx=0.93; tsy=1.09; } }
    else { const sq=Math.max(0,player.landSquash); tsy=1-sq*0.22; tsx=1+sq*0.22; }
    player.sx += (tsx-player.sx)*0.3; player.sy += (tsy-player.sy)*0.3;
    if(player.invul>0) player.invul--;
    if(player.star>0) player.star--;
    if(player.hurtT>0) player.hurtT--;
    if(player.shootCD>0) player.shootCD--;

    // coins
    for(const c of coins){
      if(c.collected) continue;
      if(overlap(player,{x:c.x,y:c.y,w:COIN,h:COIN})){
        c.collected=true; coinCount++; score+=100; sfx('coin');
        addFloat(c.x, c.y-6,'+100','#ffd23f');
        particles.push(coinPop(c.x+COIN/2, c.y));
        if(coinCount>=100){ coinCount-=100; lives++; sfx('1up'); addFloat(player.x,player.y-10,'1UP','#67d96b'); }
      }
    }

    // items (gem / 1up / star)
    for(const it of items){
      if(it.collected) continue;
      if(overlap(player,{x:it.x,y:it.y,w:ITEM,h:ITEM})){
        it.collected=true;
        if(it.type==='gem'){ score+=500; sfx('gem'); addFloat(it.x,it.y-6,'+500','#7fdcff'); for(let i=0;i<12;i++) particles.push(burst(it.x+ITEM/2,it.y+ITEM/2,'#7fdcff')); }
        else if(it.type==='1up'){ lives++; sfx('1up'); addFloat(it.x,it.y-6,'1UP','#67d96b'); for(let i=0;i<10;i++) particles.push(burst(it.x+ITEM/2,it.y+ITEM/2,'#67d96b')); }
        else if(it.type==='star'){ player.star=STAR_TIME; sfx('power'); addFloat(it.x,it.y-10,'STAR!','#ffe06a'); for(let i=0;i<16;i++) particles.push(burst(it.x+ITEM/2,it.y+ITEM/2,'#ffe06a')); }
      }
    }

    // spikes
    for(const s of spikes){ if(overlap(player,s)){ damage(s.x+s.w/2); break; } }

    // enemies
    for(const e of enemies){
      if(e.dead) continue;
      if(overlap(player,e)){
        if(player.star>0){
          e.dead=true; e.deadT=1; if(player.vy>-6) player.vy=-8; score+=200; sfx('stomp');
          addFloat(e.x, e.y-4,'+200','#ffe06a');
          for(let i=0;i<12;i++) particles.push(burst(e.x+e.w/2, e.y+e.h/2, '#ffd23f'));
          continue;
        }
        const stomp = player.vy>=0 && (player.y+player.h) - e.y < 20;
        if(stomp){
          e.dead=true; e.deadT=1; player.vy=STOMP_BOUNCE; score+=100; sfx('stomp');
          addFloat(e.x, e.y-4,'+100','#fff4d6');
          for(let i=0;i<10;i++) particles.push(burst(e.x+e.w/2, e.y+e.h/2, '#8a6fd6'));
        } else {
          damage(e.x+e.w/2);
        }
      }
    }

    // fall off the world
    if(player.y > VIEW_H + 120){ loseLife(); return; }

    // reach goal
    const poleX = GOAL_COL*TILE + 18;
    if(player.x + PW/2 >= poleX){
      state='clearing'; clearT=0; player.vx=0; keys.left=keys.right=false;
      sfx('clear');
    }

    clampCam();
  }

  function updateEnemy(e){
    if(e.dead){ e.deadT-=0.05; return; }
    e.anim += 0.15;
    e.vy += GRAVITY; if(e.vy>MAX_FALL) e.vy=MAX_FALL;
    e.vx = e.dir*ENEMY_SPEED;

    // move X
    e.x += e.vx;
    let hit = solidsInRect(e.x,e.y,e.w,e.h);
    if(hit.length){
      if(e.vx>0) e.x = Math.min.apply(null,hit.map(o=>o.left)) - e.w;
      else if(e.vx<0) e.x = Math.max.apply(null,hit.map(o=>o.left+TILE));
      e.dir*=-1;
    }
    if(e.x<0){ e.x=0; e.dir=1; }
    if(e.x>LEVEL_PX-e.w){ e.x=LEVEL_PX-e.w; e.dir=-1; }

    // move Y
    e.y += e.vy; e.onGround=false;
    let v = solidsInRect(e.x,e.y,e.w,e.h);
    if(v.length){
      if(e.vy>0){ e.y=Math.min.apply(null,v.map(o=>o.top))-e.h; e.onGround=true; }
      else if(e.vy<0){ e.y=Math.max.apply(null,v.map(o=>o.top+TILE)); }
      e.vy=0;
    }
    // ledge turn
    if(e.onGround){
      const aheadC = Math.floor((e.dir>0 ? e.x+e.w+2 : e.x-2)/TILE);
      const belowR = Math.floor((e.y+e.h+2)/TILE);
      if(!isSolid(aheadC,belowR)) e.dir*=-1;
    }
    // fall out
    if(e.y>VIEW_H+200) e.dead=true;
  }

  function updateParticles(){
    for(const p of particles){ p.vy+=p.g; p.x+=p.vx; p.y+=p.vy; p.life-=0.03; }
    particles = particles.filter(p=>p.life>0);
    for(const f of floats){ f.y-=1.1; f.life-=0.022; }
    floats = floats.filter(f=>f.life>0);
    for(const bs of blockState.values()){ if(bs.bump>0) bs.bump-=1; }
    for(const c of coins){ c.phase+=0.12; }
    for(const it of items){ it.phase+=0.08; }
  }

  function updateClearing(){
    clearT++;
    const poleX = GOAL_COL*TILE + 18;
    player.x = poleX - PW/2;
    const groundY = GROUND_ROW*TILE - PH;
    if(player.y < groundY){ player.y = Math.min(groundY, player.y+6); }
    else if(clearT>34){
      const bonus = Math.ceil(timer)*10; score += bonus; best=Math.max(best,score);
      renderWinCard(bonus); showOverlay('ov-win'); state='win';
    }
    clampCam();
  }

  function shoot(){
    if(state!=='playing' || player.shootCD>0 || projs.length>=PROJ_MAX) return;
    const dir = player.facing<0 ? -1 : 1;
    projs.push({ x: player.x+PW/2 + dir*12, y: player.y+PH*0.42, vx: dir*PROJ_SPEED, vy:0, life:PROJ_LIFE, spin:0 });
    player.shootCD=PROJ_COOLDOWN; sfx('shoot');
    for(let i=0;i<3;i++) particles.push({x:player.x+PW/2+dir*14, y:player.y+PH*0.42, vx:dir*(1+Math.random()), vy:(Math.random()-0.5), life:0.3, color:'#fff7c8', g:0, size:2});
  }
  function updateProjs(){
    for(const p of projs){
      p.life--; p.spin+=0.5; p.x+=p.vx;
      if(p.life%2===0) particles.push({x:p.x, y:p.y, vx:0, vy:0, life:0.25, color:'#fff7c8', g:0, size:2});
      if(solidsInRect(p.x-PROJ/2,p.y-PROJ/2,PROJ,PROJ).length){ p.life=0; for(let i=0;i<6;i++) particles.push(burst(p.x,p.y,'#ffe06a')); continue; }
      for(const e of enemies){
        if(e.dead) continue;
        if(overlap({x:p.x-PROJ/2,y:p.y-PROJ/2,w:PROJ,h:PROJ}, e)){
          e.dead=true; e.deadT=1; score+=100; sfx('stomp');
          addFloat(e.x, e.y-4,'+100','#ffe06a');
          for(let i=0;i<10;i++) particles.push(burst(e.x+e.w/2, e.y+e.h/2, '#ffd23f'));
          p.life=0; break;
        }
      }
      if(p.x< -60 || p.x> LEVEL_PX+60) p.life=0;
    }
    projs = projs.filter(p=>p.life>0);
  }
  function update(){
    if(state==='playing'){
      updatePlayer();
      if(state!=='playing') return; // state may have changed (death/clear)
      for(const e of enemies) updateEnemy(e);
      updateProjs();
      updateParticles();
      timer -= 1/60;
      if(timer<=0){ timer=0; loseLife(); }
    } else if(state==='clearing'){
      updateClearing(); updateParticles();
    } else {
      // ambient (title/pause/win/over): keep coins & particles lively
      for(const c of coins) c.phase+=0.12;
      for(const it of items) it.phase+=0.08;
      updateParticles();
    }
  }

  // ---------- drawing ----------
  function rr(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  function drawSky(){
    const g=ctx.createLinearGradient(0,0,0,VIEW_H);
    g.addColorStop(0,'#3aa0e8'); g.addColorStop(0.55,'#9fdcff'); g.addColorStop(1,'#dff5ff');
    ctx.fillStyle=g; ctx.fillRect(0,0,VIEW_W,VIEW_H);
    // sun
    const sx=120, sy=96;
    const sg=ctx.createRadialGradient(sx,sy,8,sx,sy,90);
    sg.addColorStop(0,'rgba(255,247,210,.95)'); sg.addColorStop(1,'rgba(255,247,210,0)');
    ctx.fillStyle=sg; ctx.beginPath(); ctx.arc(sx,sy,90,0,7); ctx.fill();
    ctx.fillStyle='#fff7d2'; ctx.beginPath(); ctx.arc(sx,sy,34,0,7); ctx.fill();
  }
  function drawHills(color, par, baseY, amp, wl){
    ctx.fillStyle=color; const off=cameraX*par;
    ctx.beginPath(); ctx.moveTo(0,VIEW_H);
    for(let x=0;x<=VIEW_W;x+=10){
      const wx=x+off; const y=baseY - Math.abs(Math.sin(wx/wl))*amp;
      ctx.lineTo(x,y);
    }
    ctx.lineTo(VIEW_W,VIEW_H); ctx.closePath(); ctx.fill();
  }
  const clouds = [];
  for(let i=0;i<7;i++) clouds.push({x:Math.random()*(VIEW_W+400)-200, y:40+Math.random()*180, s:0.6+Math.random()*0.9, sp:0.15+Math.random()*0.25});
  function drawClouds(){
    ctx.fillStyle='rgba(255,255,255,.9)';
    for(const c of clouds){
      c.x-=c.sp; if(c.x< -200) c.x=VIEW_W+200+Math.random()*100;
      const x=((c.x - cameraX*0.12) % (VIEW_W+400) + (VIEW_W+400)) % (VIEW_W+400) - 200;
      const y=c.y, s=c.s;
      ctx.beginPath();
      ctx.arc(x,y,22*s,0,7); ctx.arc(x+24*s,y+6*s,18*s,0,7);
      ctx.arc(x-24*s,y+6*s,16*s,0,7); ctx.arc(x+6*s,y-12*s,16*s,0,7);
      ctx.fill();
    }
  }

  function drawTile(c,r){
    const x=c*TILE, y=r*TILE, t=getType(c,r);
    if(t==='ground'){
      blit(!isSolid(c,r-1)?'tile_grass':'tile_dirt', x, y, TILE, TILE);
    } else if(t==='brick'){
      blit('tile_stone', x, y, TILE, TILE);
    } else if(t==='platform'){
      const l=getType(c-1,r)==='platform', rt=getType(c+1,r)==='platform';
      const name=(!l&&rt)?'tile_cloudL':(l&&!rt)?'tile_cloudR':'tile_cloudM';
      blit(name, x, y-3, TILE, TILE+5);
    } else if(t==='block'){
      const bs=blockState.get(key(c,r));
      const dy = bs&&bs.bump>0 ? -Math.sin(bs.bump/9*Math.PI)*8 : 0;
      blit('tile_crate', x, y+dy, TILE, TILE);
      if(bs&&bs.used){ ctx.fillStyle='rgba(18,10,26,.42)'; ctx.fillRect(x,y+dy,TILE,TILE); }
      else { const bl=0.5+0.5*Math.sin(tick*0.12+c); ctx.fillStyle='rgba(255,244,180,'+(0.16*bl)+')'; ctx.fillRect(x+4,y+dy+4,TILE-8,5); }
    }
  }

  function drawSpike(s){
    const groundTop=GROUND_ROW*TILE, w=TILE-2, h=42;
    const bx=Math.floor(s.x/TILE)*TILE+1;
    blit('tile_spike', bx, groundTop-h, w, h);
  }

  function drawCoin(c){
    if(c.collected) return;
    const cx=c.x+COIN/2, cy=c.y+COIN/2;
    const sw=Math.abs(Math.cos(c.phase));
    const baseW=COIN*1.18, baseH=COIN*1.18;
    const dw=Math.max(3, baseW*(0.18+0.82*sw));
    const bob=Math.sin(c.phase*0.5)*1.5;
    blit('coin', cx-dw/2, cy-baseH/2+bob, dw, baseH);
  }

  function drawItem(it){
    if(it.collected) return;
    const cx=it.x+ITEM/2, cy=it.y+ITEM/2;
    const bob=Math.sin(it.phase)*3;
    const name = it.type==='gem'?'gem' : (it.type==='1up'?'apple':'amulet');
    const gc = it.type==='gem'?'rgba(130,220,255,' : (it.type==='1up'?'rgba(120,230,140,':'rgba(255,224,120,');
    const pr = ITEM*0.7 + Math.sin(it.phase*2)*3;
    const g=ctx.createRadialGradient(cx,cy+bob,2,cx,cy+bob,pr);
    g.addColorStop(0, gc+'0.45)'); g.addColorStop(1, gc+'0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(cx,cy+bob,pr,0,7); ctx.fill();
    const f=FRAMES[name]; if(!f) return;
    const k=42/f[3], dh=f[3]*k;
    blitAnchor(name, cx, cy+bob+dh/2, k, false);
  }

  function drawProj(p){
    const f=FRAMES['spark']; if(!f) return;
    const k=(PROJ*1.6)/f[3], dw=f[2]*k, dh=f[3]*k;
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.spin);
    ctx.drawImage(atlasImg, f[0],f[1],f[2],f[3], -dw/2,-dh/2, dw,dh);
    ctx.restore();
  }

  function drawEnemy(e){
    const cx=e.x+e.w/2, by=e.y+e.h;
    const sh=FRAMES['snail_walk0'][3], k=40/sh;
    if(e.dead){
      if(e.deadT>0){ ctx.globalAlpha=Math.max(0,e.deadT); blitAnchor('snail_squash', cx, by, k*1.05, e.dir>0); ctx.globalAlpha=1; }
      return;
    }
    const seq=['snail_walk0','snail_walk1','snail_walk2','snail_walk1'];
    const name=seq[Math.floor(e.anim*1.1)%4];
    blitAnchor(name, cx, by+2, k, e.dir>0);
  }

  function drawPlayer(){
    const cx=player.x+PW/2, by=player.y+PH;
    if(player.star>0){
      const pulse=0.35+0.3*Math.sin(tick*0.4);
      const gg=ctx.createRadialGradient(cx,by-30,4,cx,by-30,42);
      gg.addColorStop(0,'rgba(255,224,120,'+pulse+')'); gg.addColorStop(1,'rgba(255,224,120,0)');
      ctx.fillStyle=gg; ctx.beginPath(); ctx.arc(cx,by-30,42,0,7); ctx.fill();
      if(tick%3===0) particles.push({x:cx+(Math.random()-0.5)*26, y:by-18-Math.random()*34, vx:(Math.random()-0.5)*1.4, vy:-Math.random()*1.4-0.4, life:0.6, color:(tick%2?'#ffe06a':'#fff7c8'), g:0.02, size:2+Math.random()*2});
    }
    if(player.invul>0 && player.star<=0 && Math.floor(tick/4)%2===0) return;
    const k=64/FRAMES['player_idle0'][3];
    let name, flip=player.facing<0;
    if(state==='clearing'||state==='win'){ name='player_win'; flip=false; }
    else if(!player.onGround){ name = player.vy<0 ? 'player_jump' : 'player_fall'; }
    else if(Math.abs(player.vx)>0.4){ const idx=((Math.floor(player.runPhase*0.955)%6)+6)%6; name='player_run'+idx; }
    else { name='player_idle'+(Math.floor(tick/16)%3); }
    if(player.hurtT>0 && state!=='clearing' && state!=='win') name='player_hurt';
    const f=FRAMES[name]||FRAMES['player_idle0'];
    const kx=k*player.sx, ky=k*player.sy;
    const dw=f[2]*kx, dh=f[3]*ky;
    let alpha=1;
    if(player.star>0){ alpha = player.star<72 ? (0.5+0.5*Math.abs(Math.sin(tick*0.5))) : (0.88+0.12*Math.sin(tick*0.6)); }
    ctx.globalAlpha=alpha;
    blit(name, cx-dw/2, by-dh, dw, dh, flip);
    ctx.globalAlpha=1;
  }

  function drawGoal(){
    const baseX=GOAL_COL*TILE+18, groundTop=GROUND_ROW*TILE;
    const k=(112/FRAMES['flag'][3])*(1+Math.sin(tick*0.08)*0.015);
    ctx.font='10px "Press Start 2P", monospace'; ctx.textAlign='center';
    ctx.fillStyle='rgba(0,0,0,.45)'; ctx.fillText('GOAL', baseX+8, groundTop-120);
    ctx.fillStyle='#ffe88a'; ctx.fillText('GOAL', baseX+6, groundTop-122);
    ctx.textAlign='left';
    blitAnchor('flag', baseX+6, groundTop+2, k, false);
  }

  function drawBush(x, baseY){
    blitAnchor('deco_grass_tuft', x, baseY, 0.5, false);
  }

  function drawWorld(){
    ctx.save();
    ctx.translate(-Math.round(cameraX),0);

    // ground-line decorations (stable by column hash)
    const c0=Math.floor(cameraX/TILE)-2, c1=Math.floor((cameraX+VIEW_W)/TILE)+2;
    for(let c=c0;c<=c1;c++){
      if(c<0||c>=LW) continue;
      if(!inPit(c) && isSolid(c,9) && !isSolid(c,8)){
        const h=((c*73)%13+13)%13;
        if(h===0) blitAnchor('deco_grass_tuft', c*TILE+24, GROUND_ROW*TILE+3, 0.5, false);
        else if(h===5) blitAnchor('deco_flower', c*TILE+24, GROUND_ROW*TILE+3, 0.5, false);
        else if(h===9) blitAnchor('deco_pebbles', c*TILE+24, GROUND_ROW*TILE+3, 0.5, false);
      }
    }

    // tiles
    for(let r=0;r<LH;r++) for(let c=c0;c<=c1;c++){ if(c>=0&&c<LW&&isSolid(c,r)) drawTile(c,r); }
    // spikes
    for(const s of spikes) drawSpike(s);
    // goal
    drawGoal();
    // coins
    for(const c of coins) drawCoin(c);
    // items
    for(const it of items) drawItem(it);
    // enemies
    for(const e of enemies) drawEnemy(e);
    // projectiles
    for(const p of projs) drawProj(p);
    // player
    if(state!=='over') drawPlayer();
    // particles
    for(const p of particles){
      ctx.globalAlpha=Math.max(0,p.life);
      if(p.coin){ ctx.fillStyle='#ffd23f'; ctx.beginPath(); ctx.ellipse(p.x,p.y,p.size*0.6,p.size,0,0,7); ctx.fill(); }
      else { ctx.fillStyle=p.color; ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size); }
    }
    ctx.globalAlpha=1;
    // floating text
    ctx.font='bold 16px "Press Start 2P", monospace'; ctx.textAlign='center';
    for(const f of floats){
      ctx.globalAlpha=Math.max(0,f.life);
      ctx.fillStyle='rgba(0,0,0,.5)'; ctx.fillText(f.text, f.x+2, f.y+2);
      ctx.fillStyle=f.color; ctx.fillText(f.text, f.x, f.y);
    }
    ctx.globalAlpha=1; ctx.textAlign='left';

    ctx.restore();
  }

  function drawHUD(){
    // top gradient strip
    const g=ctx.createLinearGradient(0,0,0,54); g.addColorStop(0,'rgba(20,14,40,.55)'); g.addColorStop(1,'rgba(20,14,40,0)');
    ctx.fillStyle=g; ctx.fillRect(0,0,VIEW_W,54);
    ctx.font='14px "Press Start 2P", monospace'; ctx.textBaseline='middle';
    ctx.fillStyle='#fff4d6';
    function label(t, x){ ctx.fillStyle='rgba(0,0,0,.55)'; ctx.fillText(t,x+2,20+2); ctx.fillStyle='#fff4d6'; ctx.fillText(t,x,20); }
    label('SCORE '+pad(score), 16);
    // coin icon + count
    const cx=350;
    ctx.fillStyle='#d99a17'; ctx.beginPath(); ctx.ellipse(cx,20,8,10,0,0,7); ctx.fill();
    ctx.fillStyle='#ffd23f'; ctx.beginPath(); ctx.ellipse(cx,20,5,8,0,0,7); ctx.fill();
    ctx.fillStyle='rgba(0,0,0,.55)'; ctx.fillText('×'+('0'+coinCount).slice(-2), cx+14+2, 20+2);
    ctx.fillStyle='#fff4d6'; ctx.fillText('×'+('0'+coinCount).slice(-2), cx+14, 20);
    // time
    label('TIME '+('00'+Math.ceil(timer)).slice(-3), 470);
    // HP hearts (right) + lives counter
    const HS=24, gap=3;
    const hpW=player.maxHp*(HS+gap)-gap, hx0=VIEW_W-14-hpW;
    for(let i=0;i<player.maxHp;i++){
      const nm = i<player.hp ? 'heart_full':'heart_empty';
      const fr=FRAMES[nm], hh=HS*fr[3]/fr[2];
      blit(nm, hx0+i*(HS+gap), 20-hh/2, HS, hh);
    }
    const lvx=hx0-60;
    ctx.fillStyle='#fffaf0'; ctx.beginPath(); ctx.arc(lvx,20,9,0,7); ctx.fill();
    ctx.fillStyle='#3aa655'; ctx.beginPath(); ctx.ellipse(lvx+2,12,4,2.5,-0.6,0,7); ctx.fill();
    ctx.fillStyle='#2b2b3a'; ctx.beginPath(); ctx.arc(lvx-3,21,1.6,0,7); ctx.arc(lvx+3,21,1.6,0,7); ctx.fill();
    ctx.font='14px "Press Start 2P", monospace';
    ctx.fillStyle='rgba(0,0,0,.55)'; ctx.fillText('×'+lives, lvx+14+2, 20+2);
    ctx.fillStyle='#fff4d6'; ctx.fillText('×'+lives, lvx+14, 20);
    ctx.textBaseline='alphabetic';
  }

  function drawLoading(){
    ctx.fillStyle='#1a1230'; ctx.fillRect(0,0,VIEW_W,VIEW_H);
    ctx.fillStyle='#ffd23f'; ctx.font='16px "Press Start 2P", monospace';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('LOADING...', VIEW_W/2, VIEW_H/2);
    ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  }
  function drawBackground(){
    const g=ctx.createLinearGradient(0,0,0,VIEW_H);
    g.addColorStop(0,'#7ec8f2'); g.addColorStop(0.6,'#bfe8ff'); g.addColorStop(1,'#e7f6ff');
    ctx.fillStyle=g; ctx.fillRect(0,0,VIEW_W,VIEW_H);
    if(!bgImg.width) return;
    const par=0.35, scale=VIEW_H/bgImg.height, tw=bgImg.width*scale, scroll=cameraX*par;
    const i0=Math.floor(scroll/tw)-1;
    for(let i=i0; i*tw - scroll < VIEW_W; i++){
      const x=i*tw - scroll, flip=(((i%2)+2)%2)===1;
      if(flip){ ctx.save(); ctx.translate(Math.round(x)+tw,0); ctx.scale(-1,1);
        ctx.drawImage(bgImg,0,0,bgImg.width,bgImg.height,0,0,tw,VIEW_H); ctx.restore(); }
      else ctx.drawImage(bgImg,0,0,bgImg.width,bgImg.height,Math.round(x),0,tw,VIEW_H);
    }
  }
  function render(){
    if(!assetsReady){ drawLoading(); return; }
    drawBackground();
    drawWorld();
    drawHUD();
  }

  // ---------- main loop ----------
  let last=performance.now(), acc=0; const STEP=1000/60;
  function frame(now){
    acc += now-last; last=now; if(acc>200) acc=200;
    let steps=0;
    while(acc>=STEP && steps<5){ update(); acc-=STEP; steps++; tick++; }
    render();
    requestAnimationFrame(frame);
  }

  // boot: build a static scene behind the title
  buildLevel(); resetEnemies(); resetCoins(true); resetItems(true); resetBlocks(); placePlayer(); clampCam();
  requestAnimationFrame(frame);

})();
</script>
</body>
